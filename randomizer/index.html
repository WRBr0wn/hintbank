<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Start the identity-font fetch at document parse, not at CSS application,
         so display-face titles do not paint at fallback size and then shrink. -->
    <link rel="preload" href="/fonts/fredoka-latin.woff2" as="font" type="font/woff2" crossorigin />
    <title>Hint Bank - Randomizer</title>
    <!-- Set the theme before paint so there is no dark/light flash on load. -->
    <script>
      try {
        var t = localStorage.getItem('hintbank-theme')
        if (t !== 'light' && t !== 'dark') {
          t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
        }
        document.documentElement.dataset.theme = t
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/randomizer/selectorMain.tsx"></script>
  </body>
</html>
